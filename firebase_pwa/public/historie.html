<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Historie převodů</title>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark-mode');</script>
  <link rel="stylesheet" href="/Style/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  </script>
</head>
<body>
<div class="app-container">
  <nav class="bottom-nav">
    <button class="nav-btn" data-page="index.html">
      <span class="nav-icon">🔄</span>
      <span>Převodník</span>
    </button>
    <button class="nav-btn active" data-page="historie.html">
      <span class="nav-icon">📜</span>
      <span>Historie</span>
    </button>
    <button class="nav-btn" data-page="nastaveni.html">
      <span class="nav-icon">⚙️</span>
      <span>Nastavení</span>
    </button>
  </nav>

  <main class="main-content">
    <div class="back-to-converter">
      <button class="back-btn" onclick="window.location.href='index.html'">← Zpět na převodník</button>
    </div>

    <div class="history-stats">
      <div class="stat-item">
        <div class="stat-value" id="totalConversions">0</div>
        <div class="stat-label">Celkem převodů</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="mostUsedCurrency">—</div>
        <div class="stat-label">Nejčastější měna</div>
      </div>
    </div>

    <div class="history-header">
      <h2>Historie převodů</h2>
      <button id="clearHistoryButton" class="clear-history-btn">Vymazat vše</button>
    </div>

    <div id="historyList" class="history-list"></div>
    <div id="historyEmpty" class="history-empty">
      <span class="empty-icon">📭</span>
      <p>Zatím žádné převody</p>
      <small>Proveďte převod pro zobrazení historie</small>
      <div style="margin-top: 20px;">
        <button class="back-btn" onclick="window.location.href='index.html'">Provést první převod</button>
      </div>
    </div>
  </main>
</div>

<script src="/JavaScript/config.js"></script>
<script src="/JavaScript/utils.js"></script>
<script src="/JavaScript/api.js"></script>
<script src="/JavaScript/storage.js"></script>
<script src="/JavaScript/ui.js"></script>
<script src="/JavaScript/converter.js"></script>
<script src="/JavaScript/history.js"></script>
<script src="/JavaScript/settings.js"></script>
<script src="/JavaScript/main.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
</html>
