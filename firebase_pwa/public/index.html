<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Převodník měn</title>
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark-mode');</script>
    <link rel="stylesheet" href="/Style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="index.html">
            <span class="nav-icon">🔄</span>
            <span>Převodník</span>
        </button>
        <button class="nav-btn" data-page="historie.html">
            <span class="nav-icon">📜</span>
            <span>Historie</span>
        </button>
        <button class="nav-btn" data-page="nastaveni.html">
            <span class="nav-icon">⚙️</span>
            <span>Nastavení</span>
        </button>
    </nav>

    <main class="main-content">
        <div class="converter-card">
            <div class="amount-section">
                <label class="input-label">Částka</label>
                <input type="number" id="amount" class="amount-input" placeholder="0.00" step="any" value="0">
            </div>

            <div class="currency-swap-container">
                <div class="currency-box">
                    <label class="input-label">Z měny</label>
                    <select id="fromCurrency" class="currency-select"></select>
                </div>
                <button id="swapBtn" class="swap-btn">⇄</button>
                <div class="currency-box">
                    <label class="input-label">Do měny</label>
                    <select id="toCurrency" class="currency-select"></select>
                </div>
            </div>

            <button id="convertBtn" class="convert-btn">Převést</button>

            <div class="result-container">
                <div class="result-card">
                    <div class="result-label">Výsledek</div>
                    <div class="result-value" id="resultValue">—</div>
                    <div class="result-rate" id="resultRate"></div>
                </div>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="lastUpdate" class="last-update"></div>
        </div>
    </main>
</div>

<script src="/JavaScript/config.js"></script>
<script src="/JavaScript/utils.js"></script>
<script src="/JavaScript/api.js"></script>
<script src="/JavaScript/storage.js"></script>
<script src="/JavaScript/ui.js"></script>
<script src="/JavaScript/converter.js"></script>
<script src="/JavaScript/history.js"></script>
<script src="/JavaScript/settings.js"></script>
<script src="/JavaScript/main.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
</html>
