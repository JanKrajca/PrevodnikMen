<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nastavení</title>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark-mode');</script>
  <link rel="stylesheet" href="/Style/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
  <nav class="bottom-nav">
    <button class="nav-btn" data-page="index.html">
      <span class="nav-icon">🔄</span>
      <span>Převodník</span>
    </button>
    <button class="nav-btn" data-page="historie.html">
      <span class="nav-icon">📜</span>
      <span>Historie</span>
    </button>
    <button class="nav-btn active" data-page="nastaveni.html">
      <span class="nav-icon">⚙️</span>
      <span>Nastavení</span>
    </button>
  </nav>

  <main class="main-content">
    <div class="settings-card">
      <div class="setting-item">
        <div class="setting-info">
          <span class="setting-icon">🌙</span>
          <div>
            <h3>Tmavý režim</h3>
            <p>Přepněte vzhled aplikace</p>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="darkModeToggle">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-item">
        <div class="setting-info">
          <span class="setting-icon">💾</span>
          <div>
            <h3>Offline režim</h3>
            <p>Použít naposledy uložené kurzy</p>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="offlineModeToggle">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-divider"></div>

      <div class="setting-info">
        <span class="setting-icon">🔄</span>
        <div>
          <h3>Aktualizace kurzů</h3>
          <p id="cacheStatus">Poslední aktualizace: —</p>
        </div>
      </div>

      <button id="refreshRatesButton" class="refresh-rates-btn">Aktualizovat kurzy</button>
    </div>

    <div class="settings-card settings-section">
      <h2>Výchozí měny</h2>

      <div style="margin-bottom: 16px;">
        <label class="input-label">Výchozí měna (od):</label>
        <select id="defaultFromCurrency" class="currency-select">
          <option value="USD">USD - Americký dolar</option>
          <option value="EUR">EUR - Euro</option>
          <option value="CZK">CZK - Česká koruna</option>
          <option value="GBP">GBP - Britská libra</option>
          <option value="JPY">JPY - Japonský jen</option>
          <option value="CAD">CAD - Kanadský dolar</option>
          <option value="AUD">AUD - Australský dolar</option>
          <option value="CHF">CHF - Švýcarský frank</option>
        </select>
      </div>

      <div style="margin-bottom: 16px;">
        <label class="input-label">Výchozí měna (do):</label>
        <select id="defaultToCurrency" class="currency-select">
          <option value="USD">USD - Americký dolar</option>
          <option value="EUR">EUR - Euro</option>
          <option value="CZK">CZK - Česká koruna</option>
          <option value="GBP">GBP - Britská libra</option>
          <option value="JPY">JPY - Japonský jen</option>
          <option value="CAD">CAD - Kanadský dolar</option>
          <option value="AUD">AUD - Australský dolar</option>
          <option value="CHF">CHF - Švýcarský frank</option>
        </select>
      </div>

      <button id="saveDefaultsButton" class="refresh-rates-btn">Uložit výchozí měny</button>
    </div>

    <div class="settings-card settings-section">
      <h2>Správa dat</h2>
      <div class="settings-buttons">
        <button id="exportDataButton" class="secondary-btn">📤 Exportovat data</button>
        <button id="importDataButton" class="secondary-btn">📥 Importovat data</button>
        <button id="resetAllButton" class="secondary-btn danger-btn">🗑️ Resetovat vše</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display: none;">
    </div>

    <div class="settings-card about-section">
      <h2>O aplikaci</h2>
      <p><strong>Smart Currency Converter</strong></p>
      <p>Verze: 1.0.0</p>
      <p>© 2024 Smart Currency Converter</p>
      <p>Aktuální kurzy jsou aktualizovány denně</p>
    </div>
  </main>
</div>

<script src="/JavaScript/config.js"></script>
<script src="/JavaScript/utils.js"></script>
<script src="/JavaScript/api.js"></script>
<script src="/JavaScript/storage.js"></script>
<script src="/JavaScript/ui.js"></script>
<script src="/JavaScript/converter.js"></script>
<script src="/JavaScript/history.js"></script>
<script src="/JavaScript/settings.js"></script>
<script src="/JavaScript/main.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
</html>
